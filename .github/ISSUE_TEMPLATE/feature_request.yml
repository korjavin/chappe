name: Feature request
description: Suggest a Chappe feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What channel-owner or agent workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Chappe do?
    validations:
      required: true
  - type: textarea
    id: cli
    attributes:
      label: CLI shape
      description: Suggested command or JSON output, if any.
      render: bash
  - type: textarea
    id: risks
    attributes:
      label: Safety and privacy notes
      description: Publishing, auth, private data, or audit implications.
